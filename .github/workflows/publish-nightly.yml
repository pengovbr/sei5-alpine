name: Nightly build

on:
  schedule:
    - cron: '20 1 * * *'

jobs:
  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: processoeletronico/sei5-alpine
            dockerfile: Dockerfile
          - image: processoeletronico/sei5-alpine-oracle
            dockerfile: Dockerfile-oracle
          - image: processoeletronico/sei5-alpine-sqlserver
            dockerfile: Dockerfile-sqlserver
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=nigthly,enable=${{ github.ref == format('refs/heads/{0}', 'main') }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
      - name: Docker Scout
        uses: docker/scout-action@v1.20.2
        with:
          command: cves,recommendations
          image: ${{ steps.meta.outputs.tags }}
          to-latest: true
          ignore-base: true
          ignore-unchanged: true
          sarif-file: sarif.output.json
          summary: true
      - name: Upload SARIF result
        id: upload-sarif
        if: ${{ github.event_name != 'pull_request_target' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sarif.output.json
