<IfModule brotli_module>
    BrotliCompressionQuality 5

    AddOutputFilterByType BROTLI_COMPRESS \
        text/html \
        text/plain \
        text/css \
        text/javascript \
        application/javascript \
        application/json \
        application/xml \
        application/rss+xml \
        application/atom+xml \
        application/xhtml+xml \
        application/x-javascript \
        image/svg+xml
</IfModule>

<IfModule deflate_module>
    AddOutputFilterByType DEFLATE \
        text/html \
        text/plain \
        text/css \
        text/javascript \
        application/javascript \
        application/json \
        application/xml \
        application/rss+xml \
        application/atom+xml \
        application/xhtml+xml \
        application/x-javascript \
        image/svg+xml
</IfModule>